<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Granot Sync</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        min-width: 680px;
        max-width: 760px;
        color: #111;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      p {
        font-size: 13px;
        color: #555;
        margin: 0 0 12px;
        line-height: 1.4;
      }
      button {
        width: auto;
        padding: 8px 12px;
        margin: 0 8px 8px 0;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      button.secondary {
        background: #475569;
      }
      button.secondary:hover {
        background: #334155;
      }
      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      #status {
        font-size: 12px;
        color: #666;
        line-height: 1.4;
        margin: 4px 0 12px;
      }
      .controls {
        margin-bottom: 8px;
      }
      .summary {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .rows {
        display: grid;
        gap: 8px;
        max-height: 480px;
        overflow: auto;
      }
      .row {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
        background: #fff;
      }
      .row.unsyncable {
        background: #f8fafc;
        color: #64748b;
      }
      .row-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .row-title {
        font-weight: 600;
        color: #0f172a;
      }
      .row-meta {
        color: #475569;
        line-height: 1.45;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 7px;
        font-size: 11px;
        background: #e0f2fe;
        color: #075985;
      }
      .badge.warn {
        background: #fef3c7;
        color: #92400e;
      }
      .badge.error {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge.ok {
        background: #dcfce7;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <h1>Granot Sync</h1>
    <p>
      Scan the visible Follow Up Estimates table, review parsed rows, then sync selected
      supported rows to Vantage.
    </p>
    <div class="controls">
      <button id="scan-follow-up" type="button">Scan Follow Up Estimates</button>
      <button id="sync-selected" type="button" disabled>Sync Selected</button>
      <button id="sync-all" type="button" disabled>Sync All Supported</button>
      <button id="select-all" class="secondary" type="button" disabled>Select All</button>
      <button id="deselect-all" class="secondary" type="button" disabled>Deselect All</button>
      <button id="dump-tables" class="secondary" type="button">Debug: Log Tables</button>
    </div>
    <div id="status"></div>
    <div id="summary" class="summary" hidden></div>
    <div id="rows" class="rows"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
